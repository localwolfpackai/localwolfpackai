<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="background: #fafafa;">
  <defs>
    <style>
      /* Clean, technical font stack */
      .name-font { font-family: 'Switzer', 'Inter', sans-serif; font-weight: 300; font-style: italic; }
      .studio-font { font-family: 'IBM Plex Mono', monospace; font-weight: 500; text-transform: uppercase; }
      .wash-font { font-family: 'Geist Mono', monospace; font-weight: 800; }
      
      .ink { fill: #1a1a1a; }
      .ink-line { stroke: #1a1a1a; stroke-width: 0.5; opacity: 0.15; }
      .ghost { fill: #1a1a1a; opacity: 0.04; }
    </style>
    
    <radialGradient id="wash" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="0.1"/>
      <stop offset="90%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1920" height="1080" fill="#fafafa"/>

  <!-- "STILL HUMAN" - Straight but Staggered (Technical Grid) -->
  <g font-size="140" class="wash-font ghost" letter-spacing="18">
    <text x="80" y="200">STILL HUMAN</text>
    <text x="1100" y="360">STILL HUMAN</text>
    <text x="350" y="520">STILL HUMAN</text>
    <text x="1250" y="680">STILL HUMAN</text>
    <text x="150" y="840">STILL HUMAN</text>
    <text x="1000" y="1000">STILL HUMAN</text>
  </g>

  <!-- Depth Wash -->
  <rect width="1920" height="1080" fill="url(#wash)"/>

  <!-- Corner Dotted Accents (Blueprint Style) -->
  <g class="ink-line" stroke-dasharray="1 15">
    <!-- Top Left -->
    <path d="M40 40 H200 M40 40 V150" fill="none" />
    <!-- Bottom Left -->
    <path d="M40 1040 H200 M40 1040 V930" fill="none" />
    <!-- Bottom Right Decor -->
    <circle cx="1880" cy="1040" r="2" fill="#1a1a1a" stroke="none" opacity="0.2"/>
  </g>

  <!-- CENTERED BRANDING -->
  <g transform="translate(960, 520)" text-anchor="middle">
    
    <!-- Geometric Logo (centered mathematically) -->
    <g transform="translate(-250, -220)">
       <path d="M240 0H330V350H500V440H247.06V175L102.52 440H0L240 0Z" class="ink"/>
    </g>

    <!-- Switzer for the name -->
    <text y="340" class="name-font ink" font-size="82" letter-spacing="2">Anthony Lupo</text>
    
    <!-- IBM Plex Mono for the studio line -->
    <text y="405" class="studio-font ink" font-size="15" letter-spacing="14" opacity="0.6">Lupo Studios</text>
    
    <!-- Minimalist Horizontal Divider -->
    <line x1="-100" y1="460" x2="100" y2="460" class="ink-line" stroke-dasharray="2 12" opacity="0.4"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="850" height="220">
  <defs>
    <!-- Dither filter: fractal noise thresholded to binary stipple -->
    <filter id="dither" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="1" seed="42" result="noise"/>
      <feComponentTransfer in="noise" result="binary">
        <feFuncA type="discrete" tableValues="0 1"/>
      </feComponentTransfer>
      <feComposite operator="in" in="SourceGraphic" in2="binary"/>
    </filter>

    <!-- Gradient controlling dither density: dissolves upward from bottom -->
    <linearGradient id="ditherFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f0f" stop-opacity="0"/>
      <stop offset="45%" stop-color="#0f0f0f" stop-opacity="0"/>
      <stop offset="72%" stop-color="#0f0f0f" stop-opacity="0.06"/>
      <stop offset="88%" stop-color="#0f0f0f" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f0f0f" stop-opacity="0.20"/>
    </linearGradient>

    <!-- Secondary dither from top-right corner for asymmetry -->
    <radialGradient id="cornerDither" cx="1" cy="0" r="0.6" fx="1" fy="0">
      <stop offset="0%" stop-color="#0f0f0f" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#0f0f0f" stop-opacity="0.03"/>
      <stop offset="70%" stop-color="#0f0f0f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card background with subtle border -->
  <rect width="850" height="220" rx="8" fill="#fafafa"/>
  <rect width="850" height="220" rx="8" fill="none" stroke="#e5e5e5" stroke-width="0.75"/>

  <!-- Bottom dither field -->
  <rect x="0" y="0" width="850" height="220" rx="8" fill="url(#ditherFade)" filter="url(#dither)"/>

  <!-- Corner dither accent -->
  <rect x="0" y="0" width="850" height="220" rx="8" fill="url(#cornerDither)" filter="url(#dither)"/>

  <!-- Title -->
  <text x="425" y="90"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="700" letter-spacing="10" fill="#0f0f0f">
    LUPO STUDIOS
  </text>

  <!-- Thin separator line -->
  <line x1="355" y1="108" x2="495" y2="108" stroke="#d4d4d4" stroke-width="0.75"/>

  <!-- Year -->
  <text x="425" y="134"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="8" fill="#a3a3a3">
    2026
  </text>
</svg>